{% extends 'base.html' %}
{% block content %}
<div class="container-gestao">
    <h2>Previsão e Metas de Vendas Comerciais</h2>
    
    <form method="POST" action="/vendas" class="form-corporativo">
        <div class="form-group">
            <label>Produto Alvo:</label>
            <select name="produto_id" required>
                <option value="">-- Selecione o Produto --</option>
                {% for produto in produtos %}
                <option value="{{ produto.id }}">{{ produto.part_number }} - {{ produto.descricao }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label>Quantidade de Meta para o Período (Unidades):</label>
            <input type="number" name="quantidade_meta" required placeholder="Ex: 1500">
        </div>
        
        <button type="submit" class="btn-salvar">Salvar Planejamento Comercial</button>
    </form>

    <div class="tabela-container">
        <h3>Painel de Metas Cadastradas</h3>
        <table class="tabela-dados">
            <thead>
                <tr>
                    <th>Código Mestre</th>
                    <th>Descrição Comercial</th>
                    <th>Meta Projetada</th>
                </tr>
            </thead>
            <tbody>
                {% for v in vendas %}
                <tr>
                    <td>{{ v.part_number }}</td>
                    <td>{{ v.descricao }}</td>
                    <td>{{ v.quantidade_meta }} un.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
